name: Continuous Integration

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix backend
          npm install --prefix frontend

      - name: Run ESLint (Frontend)
        run: npm run lint:frontend

      - name: Generate Prisma Client (Backend)
        run: npm run db:generate --prefix backend

      - name: Build Backend (Typecheck)
        run: npm run build:backend

      - name: Build Frontend (Typecheck & Build)
        run: npm run build:frontend

  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix backend

      - name: Generate Prisma Client
        run: npm run db:generate --prefix backend

      - name: Run Backend Tests
        run: npm run test:backend

  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix frontend

      - name: Run Frontend Unit Tests
        run: npm run test:frontend

  frontend-e2e-tests:
    name: Frontend E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix frontend

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./frontend/package.json').devDependencies['@playwright/test']")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers with Dependencies
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Install Playwright System Dependencies Only
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: ./frontend

      - name: Run Playwright E2E Tests
        run: npm run test:e2e
